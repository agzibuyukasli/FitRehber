version: '3.9'

# ═══════════════════════════════════════════════════════════
#  FitRehber – SonarQube Overlay
#  Kullanım: docker compose -f docker-compose.sonar.yml up -d
#  Ana sistemi (api, frontend, db) etkilemez.
# ═══════════════════════════════════════════════════════════

services:

  # ─────────────────────────────────────────
  #  SonarQube veritabanı (PostgreSQL)
  # ─────────────────────────────────────────
  sonar-db:
    image: postgres:15-alpine
    container_name: fitrehber-sonar-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    networks:
      - sonar-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  #  SonarQube Community Edition
  #  Arayüz: http://localhost:9000
  #  Varsayılan giriş: admin / admin
  # ─────────────────────────────────────────
  sonarqube:
    image: sonarqube:10.5-community
    container_name: fitrehber-sonarqube
    depends_on:
      sonar-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      # Elasticsearch için zorunlu – vm.max_map_count yetersizse başlamaz
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
      # Elasticsearch JVM heap – düşük RAM'li makineler için optimize
      SONAR_SEARCH_JAVAOPTS: "-Xms256m -Xmx256m"
      # Web JVM heap
      SONAR_WEB_JAVAOPTS: "-Xms256m -Xmx256m"
      # Compute Engine JVM heap
      SONAR_CE_JAVAOPTS: "-Xms128m -Xmx128m"
    ports:
      - "9000:9000"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
      - sonar_logs:/opt/sonarqube/logs
    networks:
      - sonar-net
    # Elasticsearch'in ihtiyaç duyduğu sistem ayarı
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 4096
        hard: 4096
    # Container'a RAM limiti – makineni boğmasın
    mem_limit: 2g
    mem_reservation: 1g

volumes:
  sonar_db_data:
  sonar_data:
  sonar_extensions:
  sonar_logs:

networks:
  sonar-net:
    driver: bridge
