sonar.projectKey=agzibuyukasli_FitRehber
sonar.organization=agzibuyukasli

# Rapor Yolları
sonar.javascript.lcov.reportPaths=src/DietitianClinic-UI/coverage/lcov.info
sonar.cs.opencover.reportsPaths=**/TestResults/**/coverage.opencover.xml

# ANALİZ DIŞINDA TUTULANLAR (Hiç taranmasın)
sonar.exclusions=\
  **/obj/**,\
  **/bin/**,\
  **/node_modules/**,\
  **/.next/**,\
  **/Migrations/**,\
  **/*.Designer.cs,\
  **/wwwroot/**,\
  src/DietitianClinic-UI/jest.config.js,\
  src/DietitianClinic-UI/jest.setup.js

# COVERAGE HESAPLAMASINDAN MUAF TUTULANLAR (Puanı düşürmesin)
# Tüm frontend dosyaları muaf: lcov yol uyumsuzluğu sıfır gösteriyor
sonar.coverage.exclusions=\
  src/DietitianClinic-UI/**,\
  **/*.Tests.cs,\
  **/Tests/**
