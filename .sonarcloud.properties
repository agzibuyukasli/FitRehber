sonar.projectKey=agzibuyukasli_FitRehber
sonar.organization=agzibuyukasli

# Frontend coverage report (Jest --coverageReporters=lcov çıktısı)
sonar.javascript.lcov.reportPaths=src/DietitianClinic-UI/coverage/lcov.info

# C# coverage report (coverlet opencover çıktısı)
sonar.cs.opencover.reportsPaths=**/TestResults/**/coverage.opencover.xml

# Coverage hesaplamasından muaf tutulanlar
sonar.coverage.exclusions=\
  src/DietitianClinic-UI/jest.config.js,\
  src/DietitianClinic-UI/jest.setup.js,\
  src/DietitianClinic-UI/**/__tests__/**,\
  src/DietitianClinic-UI/**/*.test.ts,\
  src/DietitianClinic-UI/**/*.test.tsx,\
  src/DietitianClinic-UI/**/*.test.js

# Analiz dışında tutulanlar
sonar.exclusions=\
  **/obj/**,\
  **/bin/**,\
  **/node_modules/**,\
  **/.next/**,\
  **/Migrations/**,\
  **/*.Designer.cs,\
  **/wwwroot/**,\
  src/DietitianClinic-UI/jest.config.js,\
  src/DietitianClinic-UI/jest.setup.js
