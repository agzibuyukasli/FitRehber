name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: Build and Analyze
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/DietitianClinic-UI/package-lock.json

      # ── Frontend: bağımlılıklar + coverage raporu ──────────────────────
      - name: Install Frontend Dependencies
        working-directory: src/DietitianClinic-UI
        run: npm ci

      - name: Run Frontend Tests with Coverage
        working-directory: src/DietitianClinic-UI
        run: npm run test:coverage -- --coverageReporters=lcov --coverageDirectory=coverage

      # ── SonarScanner kurulumu ───────────────────────────────────────────
      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      # ── SonarCloud: begin → build → C# test (coverage) → end ───────────
      # ÖNEMLI: dotnet test, begin/end arasında çalışmalı;
      # aksi halde SonarCloud coverage raporunu göremez.
      - name: SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin `
            /k:"agzibuyukasli_FitRehber" `
            /o:"agzibuyukasli" `
            /d:sonar.host.url="https://sonarcloud.io" `
            /d:sonar.token="$env:SONAR_TOKEN" `
            /d:sonar.javascript.lcov.reportPaths="src/DietitianClinic-UI/coverage/lcov.info" `
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml"

          dotnet build --no-incremental

          dotnet test src/DietitianClinic.Tests.Unit/DietitianClinic.Tests.Unit.csproj `
            /p:CollectCoverage=true `
            /p:CoverletOutputFormat=opencover `
            /p:CoverletOutput="TestResults/coverage"

          dotnet sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"
